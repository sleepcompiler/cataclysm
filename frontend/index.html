<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hex Strategy Game</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="error-overlay"
    style="display:none;position:fixed;top:0;left:0;right:0;background:red;color:white;padding:16px;z-index:99999;font-family:monospace;white-space:pre-wrap;max-height:50vh;overflow:auto;">
  </div>
  <script>
    window.onerror = function (msg, src, line, col, err) {
      var el = document.getElementById('error-overlay');
      el.style.display = 'block';
      el.textContent += msg + '\n  at ' + src + ':' + line + ':' + col + '\n\n';
    };
    window.addEventListener('unhandledrejection', function (e) {
      var el = document.getElementById('error-overlay');
      el.style.display = 'block';
      el.textContent += 'Unhandled rejection: ' + (e.reason?.message || e.reason) + '\n' + (e.reason?.stack || '') + '\n\n';
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
